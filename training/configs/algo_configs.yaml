sac:
  policy: MlpPolicy
  learning_rate: 3.0e-4
  buffer_size: 200000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  ent_coef: auto
  policy_kwargs:
    net_arch: [256, 256]

td3:
  policy: MlpPolicy
  learning_rate: 1.0e-3
  buffer_size: 200000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  policy_kwargs:
    net_arch: [400, 300]

ppo:
  policy: MlpPolicy
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
